services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgrag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgrag
    ports:
      - "5432:5432"
    volumes:
      - pgrag_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp:
    build: ./app/backend
    container_name: pgrag-mcp
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "pg_rag.mcp_integration.server"]
    ports:
      - "8001:8001"
    env_file:
      - ./app/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pgrag
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./app/backend
    container_name: pgrag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pgrag
      MCP_SERVER_URL: http://mcp:8001/mcp
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      mcp:
        condition: service_started

  frontend:
    build: ./app/frontend
    container_name: pgrag-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgrag_data:
